<!DOCTYPE html>
<html>
<head>
<base target="_top">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{ background:#f4f4f4; padding:20px; }
.card-principal{ background:white; max-width:800px; margin:auto; padding:30px; border-radius:15px; box-shadow:0 0 10px rgba(0,0,0,.1); }
.filtro-seccion { background: #e9ecef; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
.partido-card { border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; background: #fff; transition: transform 0.2s; }
.input-goles{ width:70px; text-align:center; font-size:20px; font-weight: bold; }
.vs-text { font-weight: bold; color: #666; margin-top: 5px; }
.btn-enviar-lista { min-width: 150px; }
.fecha-header { border-bottom: 2px solid #198754; padding-bottom: 10px; margin-bottom: 20px; color: #198754; }
</style>
</head>
<body>
<div class="card-principal">
    <h1 class="text-center mb-4">🏆 Polla Mundial 2026</h1>

    <div class="filtro-seccion">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="fw-bold">1. Selecciona tu nombre</label>
                <select id="Participantes" class="form-select" onchange="actualizarTodo()">
                    <option value="">-- Selecciona --</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="fw-bold">2. Selecciona la fecha</label>
                <select id="FiltroFecha" class="form-select" onchange="actualizarTodo()">
                    <option value="">-- Todas las fechas --</option>
                </select>
            </div>
        </div>
    </div>

    <div id="lista-partidos">
        <div class="text-center">Cargando partidos...</div>
    </div>

    <div id="mensaje-vacio" class="text-center alert alert-warning d-none">
        No hay partidos programados para los criterios seleccionados.
    </div>
</div>

<script>
let data = { participantes: [], partidos: [], pronosticos: [] };

window.onload = function() { cargarDatos(); };

function haComenzadoPartido(fechaPartidoStr, horaPartidoStr) {
    const [dia, mes, anio] = fechaPartidoStr.split('/').map(Number);
    let [horas, minutos] = [0, 0];
    const horaPartes = horaPartidoStr.match(/(\d+):(\d+)/);
    if (horaPartes) {
        horas = parseInt(horaPartes[1]);
        minutos = parseInt(horaPartes[2]);
        if (horaPartidoStr.toLowerCase().includes('p.m.') && horas < 12) horas += 12;
        if (horaPartidoStr.toLowerCase().includes('a.m.') && horas === 12) horas = 0;
    }
    const fechaHoraPartido = new Date(anio, mes - 1, dia, horas, minutos);
    return new Date() >= fechaHoraPartido;
}

function cargarDatos() {
    google.script.run
        .withSuccessHandler(function(res){
            data = res;
            cargarParticipantes();
            cargarFechas();
            renderizarListaPartidos();
        })
        .obtenerDatos();
}

function cargarParticipantes() {
    const select = document.getElementById("Participantes");
    select.innerHTML = '<option value="">-- Selecciona --</option>';
    data.participantes.forEach(nombre => {
        let option = document.createElement("option");
        option.value = nombre; option.textContent = nombre;
        select.appendChild(option);
    });
}

function cargarFechas() {
    const select = document.getElementById("FiltroFecha");
    const fechas = [...new Set(data.partidos.map(p => p[4]))].sort();
    select.innerHTML = '<option value="">-- Todas las fechas --</option>';
    fechas.forEach(fecha => {
        let option = document.createElement("option");
        option.value = fecha; option.textContent = fecha;
        select.appendChild(option);
    });
}

function actualizarTodo() { renderizarListaPartidos(); }

function renderizarListaPartidos() {
    const contenedor = document.getElementById("lista-partidos");
    const nombreParticipante = document.getElementById("Participantes").value;
    const fechaSeleccionada = document.getElementById("FiltroFecha").value;
    
    let partidosAMostrar = fechaSeleccionada ? data.partidos.filter(p => p[4] === fechaSeleccionada) : data.partidos;
    contenedor.innerHTML = "";

    partidosAMostrar.forEach((p) => {
        const partidoYaComenzo = haComenzadoPartido(p[4], p[5]);
        const miPronostico = data.pronosticos.find(r => r[0] == nombreParticipante && r[1] == p[0]);
        
        const yaEnviado = !!miPronostico;
        const deshabilitarInputs = yaEnviado || partidoYaComenzo;
        
        // Si el partido ya empezó, ocultamos los goles ajenos. 
        // Solo mostramos los valores si el usuario ya envió su propio pronóstico.
        const valorA = miPronostico ? miPronostico[4] : "";
        const valorB = miPronostico ? miPronostico[5] : "";

        const card = document.createElement("div");
        card.className = "partido-card";
        card.innerHTML = `
            <div class="row align-items-center">
                <div class="col-12 mb-2"><small class="text-muted">Partido ${p[0]} | ${p[4]} - ${p[5]}</small></div>
                <div class="col-4 text-end"><h5>${p[1]}</h5></div>
                <div class="col-4">
                    <div class="d-flex justify-content-center align-items-center gap-2">
                        <input type="number" id="golesA_${p[0]}" class="form-control input-goles" value="${valorA}" ${deshabilitarInputs ? 'disabled' : ''}>
                        <span class="vs-text">-</span>
                        <input type="number" id="golesB_${p[0]}" class="form-control input-goles" value="${valorB}" ${deshabilitarInputs ? 'disabled' : ''}>
                    </div>
                </div>
                <div class="col-4 text-start"><h5>${p[2]}</h5></div>
                <div class="col-12 mt-3 text-center">
                    <button id="btn_${p[0]}" class="btn ${yaEnviado ? 'btn-secondary' : (partidoYaComenzo ? 'btn-danger' : 'btn-success')} btn-enviar-lista" 
                        onclick="enviarIndividual('${p[0]}', '${p[1]}', '${p[2]}', '${p[4]}', '${p[5]}')" 
                        ${deshabilitarInputs || !nombreParticipante ? 'disabled' : ''}>
                        ${yaEnviado ? '✓ Enviado' : (partidoYaComenzo ? 'Partido Iniciado' : 'Enviar Marcador')}
                    </button>
                </div>
            </div>
        `;
        contenedor.appendChild(card);
    });
}

function enviarIndividual(partidoId, equipoA, equipoB, fecha, hora) {
    const nombre = document.getElementById("Participantes").value;
    const golesA = document.getElementById("golesA_" + partidoId).value;
    const golesB = document.getElementById("golesB_" + partidoId).value;

    if (!nombre) { alert("Selecciona tu nombre."); return; }
    if (golesA === "" || golesB === "") { alert("Ingresa ambos marcadores."); return; }

    const btn = document.getElementById("btn_" + partidoId);
    btn.disabled = true; btn.innerText = "Enviando...";

    google.script.run
        .withSuccessHandler(function(msg){ alert(msg); cargarDatos(); })
        .guardarPronostico({nombre, partidoId, equipoA, equipoB, golesA, golesB});
}
</script>
</body>
</html>
