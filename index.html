<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLERO TIEMPO REAL | POLLA 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Roboto', sans-serif; }
        .oswald { font-family: 'Oswald', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center border-b border-slate-700 pb-6">
            <h1 class="oswald text-4xl text-white uppercase italic tracking-tighter">Centro de <span class="text-blue-500">Resultados</span></h1>
            <p id="status-text" class="text-[10px] text-slate-500 mt-2 uppercase font-bold tracking-widest text-center">Cargando datos...</p>
        </header>

        <div id="loader" class="text-center py-20">
            <i class="fas fa-sync fa-spin text-3xl text-blue-500"></i>
            <p class="mt-4 text-slate-500 text-xs uppercase font-bold tracking-widest">Sincronizando con la cancha...</p>
        </div>

        <div id="error-panel" class="hidden text-center bg-red-900/10 p-8 rounded-2xl border border-red-500/20">
            <i class="fas fa-exclamation-triangle text-3xl text-red-500 mb-4"></i>
            <h2 class="text-lg font-bold mb-2">Error de Sincronización</h2>
            <p class="text-slate-400 text-sm mb-4">No se pudieron cargar los datos.</p>
            <button onclick="location.reload()" class="bg-slate-800 px-4 py-2 rounded text-[10px] uppercase font-bold">Reintentar</button>
        </div>

        <div id="dashboard" class="hidden">
            <div id="podium" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>
            <div class="card overflow-hidden mb-10 shadow-2xl">
                <table class="w-full text-sm">
                    <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                        <tr>
                            <th class="px-4 py-4 text-left">Pos</th>
                            <th class="px-4 py-4 text-left">Participante</th>
                            <th class="px-4 py-4 text-center">Pts</th>
                            <th class="px-4 py-4 text-center">Ex</th>
                            <th class="px-4 py-4 text-center">Ac</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-700/50"></tbody>
                </table>
            </div>
            <h2 class="oswald text-xl uppercase mb-6 text-slate-300 italic border-l-4 border-blue-500 pl-3">Detalle Pronósticos (Solo Jugados)</h2>
            <div id="details" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcgcF0X8JnZxqIxvDv9FHdvo-QVZYm6aX6OZDCzTJ_-jHLeakn8fCQSaDAIAY-_Fk4v9rnHZYAPBxW/pub?output=csv';

        async function init() {
            try {
                const urlP = CSV_URL + "&gid=0";
                const urlPr = CSV_URL + "&gid=18329811";
                const [resP, resPr] = await Promise.all([
                    fetch(urlP).then(r => r.text()),
                    fetch(urlPr).then(r => r.text())
                ]);
                if(resP.includes('<!DOCTYPE html>')) throw new Error("Bloqueo");
                process(parseCSV(resP), parseCSV(resPr));
            } catch (e) {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('error-panel').classList.remove('hidden');
            }
        }

        function parseCSV(t) {
            const lines = t.split('\n').filter(r => r.trim() !== '');
            const headers = lines[0].split(',').map(x => x.trim().replace(/"/g,'').toLowerCase().replace(/\s/g,''));
            return lines.slice(1).map(r => {
                const values = r.split(',').map(x => x.trim().replace(/"/g,''));
                const obj = {}; headers.forEach((h, i) => obj[h] = values[i] || "");
                return obj;
            });
        }

        function calc(pa, pb, ra, rb) {
            if (ra === "" || ra === undefined || isNaN(parseInt(ra))) return 0;
            const [pA, pB, rA, rB] = [parseInt(pa), parseInt(pb), parseInt(ra), parseInt(rb)];
            if (pA === rA && pB === rB) return 3;
            const pR = pA > pB ? 'A' : (pA < pB ? 'B' : 'E');
            const rR = rA > rB ? 'A' : (rA < rB ? 'B' : 'E');
            return pR === rR ? 1 : 0;
        }

        function getMedal(index) {
            if(index === 0) return '🥇';
            if(index === 1) return '🥈';
            if(index === 2) return '🥉';
            return '';
        }

        function process(partidos, pronosticos) {
            const pMap = {};
            partidos.forEach(p => pMap[p.id || p.idpartido] = p);

            const s = {};
            pronosticos.forEach(pr => {
                const u = pr.participante; if(!u) return;
                if(!s[u]) s[u] = {n:u, p:0, ex:0, ac:0, d:[]};
                const m = pMap[pr.idpartido || pr.id];
                if(m) {
                    const rA = m.golesa; const rB = m.golesb;
                    const pA = pr.golesa; const pB = pr.golesb;
                    const pts = calc(pA, pB, rA, rB);
                    
                    s[u].p += pts; if(pts === 3) s[u].ex++; if(pts === 1) s[u].ac++;
                    
                    // FILTRADO ABSOLUTO: Solo se guarda en la lista 'd' si hay resultado real
                    const tieneResultado = (rA !== "" && rA !== undefined && !isNaN(parseInt(rA)));
                    if (tieneResultado) {
                        s[u].d.push({ 
                            t: `${m.equipoa} vs ${m.equipob}`, 
                            p: `${pA}-${pB}`, 
                            r: `${rA}-${rB}`, 
                            pts 
                        });
                    }
                }
            });

            render(Object.values(s).sort((a,b) => b.p - a.p || b.ex - a.ex));
        }

        function render(data) {
            document.getElementById('table-body').innerHTML = data.map((p,i) => `
                <tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="px-4 py-4 font-bold text-slate-500">#${i+1}</td>
                    <td class="px-4 py-4 font-bold text-slate-200 uppercase">${p.n} ${getMedal(i)}</td>
                    <td class="px-4 py-4 text-center font-black text-blue-400 text-lg">${p.p}</td>
                    <td class="px-4 py-4 text-center text-green-500 font-bold">${p.ex}</td>
                    <td class="px-4 py-4 text-center text-blue-500 font-bold">${p.ac}</td>
                </tr>
            `).join('');

            document.getElementById('podium').innerHTML = data.slice(0,3).map((p,i) => `
                <div class="card p-5 text-center border-b-4 ${i===0?'border-yellow-500':'border-slate-600'} shadow-lg">
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Puesto #${i+1}</p>
                    <h3 class="font-bold text-white uppercase truncate text-xs">${p.n}</h3>
                    <p class="text-3xl font-black mb-2">${getMedal(i)}</p>
                    <p class="text-2xl font-black text-blue-500">${p.p} PTS</p>
                </div>
            `).join('');

            document.getElementById('details').innerHTML = data.map(p => `
                <div class="card p-5 shadow-lg">
                    <div class="flex justify-between border-b border-slate-700/50 pb-3 mb-3">
                        <span class="font-bold text-slate-200 text-xs uppercase">${p.n}</span>
                        <span class="text-blue-500 font-bold text-xs">${p.p} PTS</span>
                    </div>
                    <div class="space-y-2">
                        ${p.d.length > 0 ? p.d.map(m => `
                            <div class="flex justify-between text-[10px] items-center">
                                <span class="text-slate-400 truncate w-32 uppercase font-medium">${m.t}</span>
                                <div class="flex items-center gap-2">
                                    <span class="bg-slate-800 px-2 py-0.5 rounded text-slate-400">P:${m.p}</span>
                                    <span class="bg-slate-700 px-2 py-0.5 rounded text-white font-bold">R:${m.r}</span>
                                    <span class="w-5 text-right font-bold ${m.pts === 3 ? 'text-green-500' : (m.pts === 1 ? 'text-blue-500' : 'text-slate-600')}">+${m.pts}</span>
                                </div>
                            </div>
                        `).join('') : '<p class="text-[10px] text-slate-500 italic">No hay partidos jugados aún.</p>'}
                    </div>
                </div>
            `).join('');

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('status-text').innerHTML = '<div class="flex items-center justify-center space-x-2"><div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div><span>TIEMPO REAL ACTIVO</span></div>';
        }

        init();
    </script>
</body>
</html>
